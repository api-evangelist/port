naftiko: 1.0.0-alpha2
info:
  label: Port API — Apps
  description: 'Port API — Apps. 4 operations. Lead operation: Get all credentials. Self-contained Naftiko capability covering
    one Port business surface.'
  tags:
  - Port
  - Apps
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORT_API_KEY: PORT_API_KEY
capability:
  consumes:
  - type: http
    namespace: port-apps
    baseUri: ''
    description: Port API — Apps business capability. Self-contained, no shared references.
    resources:
    - name: v1-apps
      path: /v1/apps
      operations:
      - name: get
        method: GET
        description: Get all credentials
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: The fields to include in the response. If not specified, all fields will be included.
    - name: v1-apps-id
      path: /v1/apps/{id}
      operations:
      - name: delete
        method: DELETE
        description: Delete credentials
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The `id` of the credentials set you want to operate on.
          required: true
      - name: put
        method: PUT
        description: Change the name of a credentials set
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The `id` of the credentials set you want to operate on.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-apps-id-rotate-secret
      path: /v1/apps/{id}/rotate-secret
      operations:
      - name: post
        method: POST
        description: Rotate secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The `id` of the credentials set you want to operate on.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PORT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: port-apps-rest
    port: 8080
    description: REST adapter for Port API — Apps. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/apps
      name: v1-apps
      description: REST surface for v1-apps.
      operations:
      - method: GET
        name: get
        description: Get all credentials
        call: port-apps.get
        with:
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/apps/{id}
      name: v1-apps-id
      description: REST surface for v1-apps-id.
      operations:
      - method: DELETE
        name: delete
        description: Delete credentials
        call: port-apps.delete
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Change the name of a credentials set
        call: port-apps.put
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/apps/{id}/rotate-secret
      name: v1-apps-id-rotate-secret
      description: REST surface for v1-apps-id-rotate-secret.
      operations:
      - method: POST
        name: post
        description: Rotate secret
        call: port-apps.post
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: port-apps-mcp
    port: 9090
    transport: http
    description: MCP adapter for Port API — Apps. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-all-credentials
      description: Get all credentials
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: port-apps.get
      with:
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-credentials
      description: Delete credentials
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: port-apps.delete
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: change-name-credentials-set
      description: Change the name of a credentials set
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: port-apps.put
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: rotate-secret
      description: Rotate secret
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: port-apps.post
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
