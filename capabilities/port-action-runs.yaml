          active: rest.active
          user_email: rest.user_email
          user_id: rest.user_id
          limit: rest.limit
          exclude: rest.exclude
          external_run_id: rest.external_run_id
          version: rest.version
          action: rest.action
          source: rest.source
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/actions/runs/{run-id}
