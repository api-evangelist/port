naftiko: 1.0.0-alpha2
info:
  label: Port API — Teams
  description: 'Port API — Teams. 6 operations. Lead operation: Get all teams in your organization. Self-contained Naftiko
    capability covering one Port business surface.'
  tags:
  - Port
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORT_API_KEY: PORT_API_KEY
capability:
  consumes:
  - type: http
    namespace: port-teams
    baseUri: ''
    description: Port API — Teams business capability. Self-contained, no shared references.
    resources:
    - name: v1-teams
      path: /v1/teams
      operations:
      - name: get
        method: GET
        description: Get all teams in your organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: The fields you want to fetch for each team. If used, only the specified fields will be included in
            the response.
      - name: post
        method: POST
        description: Create a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-teams-name
      path: /v1/teams/{name}
      operations:
      - name: get
        method: GET
        description: Get a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: The fields you want to fetch for the team. If used, only the specified fields will be included in the
            response.
        - name: name
          in: path
          type: string
          description: The name of the team you want to fetch.
          required: true
      - name: patch
        method: PATCH
        description: Update a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The name of the team you want to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: put
        method: PUT
        description: Change a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The name of the team you want to change.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: delete
        method: DELETE
        description: Delete a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The name of the team you want to delete.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PORT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: port-teams-rest
    port: 8080
    description: REST adapter for Port API — Teams. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v1/teams
      name: v1-teams
      description: REST surface for v1-teams.
      operations:
      - method: GET
        name: get
        description: Get all teams in your organization
        call: port-teams.get
        with:
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create a team
        call: port-teams.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/teams/{name}
      name: v1-teams-name
      description: REST surface for v1-teams-name.
      operations:
      - method: GET
        name: get
        description: Get a team
        call: port-teams.get
        with:
          fields: rest.fields
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch
        description: Update a team
        call: port-teams.patch
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Change a team
        call: port-teams.put
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Delete a team
        call: port-teams.delete
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: port-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for Port API — Teams. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-all-teams-your-organization
      description: Get all teams in your organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: port-teams.get
      with:
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: create-team
      description: Create a team
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: port-teams.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-team
      description: Get a team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: port-teams.get
      with:
        fields: tools.fields
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: update-team
      description: Update a team
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: port-teams.patch
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: change-team
      description: Change a team
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: port-teams.put
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-team
      description: Delete a team
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: port-teams.delete
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
