naftiko: 1.0.0-alpha2
info:
  label: Port API — Migrations
  description: 'Port API — Migrations. 4 operations. Lead operation: Get all migrations. Self-contained Naftiko capability
    covering one Port business surface.'
  tags:
  - Port
  - Migrations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORT_API_KEY: PORT_API_KEY
capability:
  consumes:
  - type: http
    namespace: port-migrations
    baseUri: ''
    description: Port API — Migrations business capability. Self-contained, no shared references.
    resources:
    - name: v1-migrations
      path: /v1/migrations
      operations:
      - name: get
        method: GET
        description: Get all migrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: array
        - name: actor
          in: query
          type: string
          description: The identifier of the user who initiated the migration. You can use the [Get user](https://docs.port.io/api-reference/get-a-user/)
            route to get a user's identif
        - name: blueprint
          in: query
          type: string
          description: The identifier of the blueprint associated with the migration.
      - name: post
        method: POST
        description: Create a migration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-migrations-migration_id
      path: /v1/migrations/{migration_id}
      operations:
      - name: get
        method: GET
        description: Get a migration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: migration_id
          in: path
          type: string
          description: The identifier of the migration you want to fetch.
          required: true
    - name: v1-migrations-migration_id-cancel
      path: /v1/migrations/{migration_id}/cancel
      operations:
      - name: post
        method: POST
        description: Cancel a migration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: migration_id
          in: path
          type: string
          description: The identifier of the migration you want to cancel.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PORT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: port-migrations-rest
    port: 8080
    description: REST adapter for Port API — Migrations. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/migrations
      name: v1-migrations
      description: REST surface for v1-migrations.
      operations:
      - method: GET
        name: get
        description: Get all migrations
        call: port-migrations.get
        with:
          status: rest.status
          actor: rest.actor
          blueprint: rest.blueprint
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create a migration
        call: port-migrations.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/migrations/{migration-id}
      name: v1-migrations-migration-id
      description: REST surface for v1-migrations-migration_id.
      operations:
      - method: GET
        name: get
        description: Get a migration
        call: port-migrations.get
        with:
          migration_id: rest.migration_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/migrations/{migration-id}/cancel
      name: v1-migrations-migration-id-cancel
      description: REST surface for v1-migrations-migration_id-cancel.
      operations:
      - method: POST
        name: post
        description: Cancel a migration
        call: port-migrations.post
        with:
          migration_id: rest.migration_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: port-migrations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Port API — Migrations. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-all-migrations
      description: Get all migrations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: port-migrations.get
      with:
        status: tools.status
        actor: tools.actor
        blueprint: tools.blueprint
      outputParameters:
      - type: object
        mapping: $.
    - name: create-migration
      description: Create a migration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: port-migrations.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-migration
      description: Get a migration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: port-migrations.get
      with:
        migration_id: tools.migration_id
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-migration
      description: Cancel a migration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: port-migrations.post
      with:
        migration_id: tools.migration_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
